<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinema XXI - Nikmati Film Terbaik</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <a href="index.html" class="logo">
                    <i class="fas fa-film"></i> CINEMA XXI
                </a>
            </div>
            <div class="nav-search">
                <input type="text" id="searchInput" placeholder="Cari film...">
                <i class="fas fa-search"></i>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link active">Now Showing</a></li>
                <li><a href="cinemas.html" class="nav-link">Bioskop</a></li>
                <li><a href="my-tickets.html" class="nav-link"><i class="fas fa-ticket-alt"></i> Tiket Saya</a></li>
                <li><button class="login-btn">Login</button></li>
            </ul>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1>Nikmati <span class="highlight">Film</span> Terbaik</h1>
            <p>Rasakan sensasi bioskop premium di XXI</p>
            <a href="cinemas.html" class="cta-btn">
                <i class="fas fa-play"></i> Pesan Tiket Sekarang
            </a>
        </div>
        <div class="hero-gradient"></div>
    </section>

    <!-- Movies Section -->
    <section class="movies-section">
        <div class="container">
            <div class="section-header">
                <h2>Now Showing</h2>
                <a href="cinemas.html" class="view-all">Lihat Semua Bioskop →</a>
            </div>
            <div class="movies-grid" id="moviesGrid">
                <!-- Movies akan dimuat oleh JavaScript -->
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 Cinema XXI. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/app.js"></script>
    <script src="js/movies.js"></script>
</body>
</html>
